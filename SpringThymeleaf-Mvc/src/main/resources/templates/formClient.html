<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Gestión de Reparación</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/formClient.css}">
</head>
<body>

    <nav th:replace="~{layout/layout :: navbar}"></nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1 th:text="${client.id != null ? 'Editar Cliente' : 'Nuevo Cliente'}">Cliente</h1>
            </div>

            <!-- Formulario -->
            <form th:action="${client.id != null} ? @{'/client/' + ${client.id}} : @{/client}"
                  th:object="${client}" method="post" class="form-client">
                <input type="hidden" th:field="*{id}" th:if="${client.id != null}">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Nombre">
                    </div>
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="span-errors">Error name</span>
                    <div class="form-group">
                        <label for="lastName">Apellido:</label>
                        <input type="text" id="lastName" th:field="*{lastName}" placeholder="Apellido">
                    </div>
                    <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="span-errors">Error last name</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" th:field="*{email}" placeholder="email@example.com">
                    </div>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="span-errors">Error email</span>
                    <div class="form-group">
                        <label for="cuit">CUIT:</label>
                        <input type="text" id="cuit" th:field="*{cuit}" placeholder="CUIT">
                    </div>
                    <span th:if="${#fields.hasErrors('cuit')}" th:errors="*{cuit}" class="span-errors">Error cuit</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Teléfono:</label>
                        <input type="text" id="phone" th:field="*{phone}" placeholder="Teléfono">
                    </div>
                    <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="span-errors">Error phone</span>
                    <div class="form-group">
                        <label for="address">Dirección:</label>
                        <input type="text" id="address" th:field="*{address}" placeholder="Dirección">
                    </div>
                    <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="span-errors">Error address</span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a th:href="@{/client}" class="btn btn-secondary">Volver</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{layout/layout :: footer}"></footer>

</body>
</html>
