<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Gestión de Reparación</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/formClient.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <a th:href="@{/}">Gestión de Reparación</a>
        </div>
        <ul class="nav-menu">
            <li><a th:href="@{/}">Clientes</a></li>
            <li><a th:href="@{/}">Servicios</a></li>
            <li><a th:href="@{/}">Presupuestos</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <!-- Si el cliente tiene ID, es editar; si no, es nuevo -->
                <h1 th:text="${client.id != null ? 'Editar Cliente' : 'Nuevo Cliente'}">Cliente</h1>
            </div>

            <!-- Formulario -->
            <!-- Si tiene ID, POST a /client/{id}; si no, POST a /client -->
            <form th:action="${client.id != null} ? @{'/client/' + ${client.id}} : @{/client}" th:object="${client}" method="post" class="form-client">
                <!-- ID oculto para edición -->
                <input type="hidden" th:field="*{id}" th:if="${client.id != null}">

                <!-- Row 1: Nombre + Apellido -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Nombre" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Apellido:</label>
                        <input type="text" id="lastName" th:field="*{lastName}" placeholder="Apellido" required>
                    </div>
                </div>

                <!-- Row 2: Email + CUIT -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" th:field="*{email}" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label for="cuit">CUIT:</label>
                        <input type="text" id="cuit" th:field="*{cuit}" placeholder="CUIT">
                    </div>
                </div>

                <!-- Row 3: Teléfono + Dirección -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Teléfono:</label>
                        <input type="text" id="phone" th:field="*{phone}" placeholder="Teléfono" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Dirección:</label>
                        <input type="text" id="address" th:field="*{address}" placeholder="Dirección">
                    </div>
                </div>

                <!-- Row 4: Botones -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Gestión de Reparación. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
