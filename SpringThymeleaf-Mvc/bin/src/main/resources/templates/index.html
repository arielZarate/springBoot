<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Gestión de Reparación</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

<nav th:replace="~{layout/layout :: navbar}"></nav>

<!-- Main Content -->
<main class="main-content">
    <div class="container">
        <!-- Page Header con botón siempre-visible -->
        <div class="page-header">
            <h1>Clientes</h1>
            <a th:href="@{/client/new}" class="btn btn-primary">Nuevo Cliente</a>
        </div>

        <!-- Tabla siempre visible -->
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Email</th>
                <th>CUIT</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <!-- Si hay clientes, mostrar -->
            <tr th:each="client : ${clients}">
                <td th:text="${client.id}"></td>
                <td th:text="${client.name}"></td>
                <td th:text="${client.lastName}"></td>
                <td th:text="${client.phone}"></td>
                <td th:text="${client.address}"></td>
                <td th:text="${client.email}"></td>
                <td th:text="${client.cuit}"></td>
                <td class="actions">
                    <a th:href="@{/client/{id}(id=${client.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <form th:action="@{/client/{id}(id=${client.id})}"
                          method="post"
                          onsubmit="return confirm('¿Estás seguro que querés eliminar este cliente?')"
                    >
                        <input type="hidden" name="_method" value="delete"/>
                        <button type="submit" class="btn btn-sm btn-danger btn-delete">
                            Eliminar
                        </button>
                    </form>
                </td>
            </tr>
            <!-- Si NO hay clientes, mostrar fila vacía -->
            <tr th:if="${clients == null or clients.empty}">
                <td colspan="8" class="mensaje-vacio">No hay clientes registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{layout/layout :: footer}"></footer>

</body>
</html>
